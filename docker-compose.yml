# AI Test Generator — деплой на Ubuntu (nginx + app + volume)
# Запуск: docker compose up -d
# Остановка: docker compose down

services:
  # Приложение (Node.js + OCR)
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: ai-testgen-app:latest
    container_name: ai-testgen-app
    restart: unless-stopped
    env_file:
      - .env
    environment:
      NODE_ENV: production
      PORT: 3000
      DATA_DIR: /data
    volumes:
      - app_data:/data
    expose:
      - "3000"
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/api/health', (r) => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1));"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3

  # Nginx (reverse proxy, единая точка входа)
  nginx:
    image: nginx:1.25-alpine
    container_name: ai-testgen-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      app:
        condition: service_healthy

volumes:
  app_data:
    name: ai-testgen-data
